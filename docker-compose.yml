# ConsultHUB — full stack: PostgreSQL + FastAPI + nginx-served frontend.
#
#   cp .env.example .env      # then edit SECRET_KEY (required)
#   docker compose up --build
#   open http://localhost:8080
#
# SECRET_KEY is REQUIRED (no insecure default) — compose won't start without it.
# Seeding the demo data (with a known admin password) is opt-in via SEED_ON_START.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: consulthub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-consulthub}
      POSTGRES_DB: consulthub
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consulthub -d consulthub"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://consulthub:${POSTGRES_PASSWORD:-consulthub}@db:5432/consulthub
      # Required — no default. A shared/known key lets anyone forge admin tokens.
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required — copy .env.example to .env and set it}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
      # Seeds a demo tenant + users with a KNOWN password. Off by default; only
      # enable for local demos, never on an internet-reachable deployment.
      SEED_ON_START: ${SEED_ON_START:-false}
      DEBUG: ${DEBUG:-false}
      # Optional integrations (else console fallback):
      SMTP_HOST: ${SMTP_HOST:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db-data:
  uploads:
