# WebSocket upgrade support for /api/ws.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate-limit the credential-accepting endpoints to blunt online brute-forcing
# (no app-level throttling exists). ~20 requests/min per client IP, small burst.
limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;
limit_req_status 429;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers for responses that don't set their own (the
    # proxied API and the SPA fallback). Document-specific headers (CSP, frame
    # options) are set on the HTML response below.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # The service worker and shell must never be cached, so updates land.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        # The app document: lock down framing and sources. connect-src 'self'
        # covers same-origin API + WebSocket; blob:/data: cover brand images
        # fetched as object URLs and inline SVG data.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Throttled auth endpoints (login / portal login / activation / reset
    # request). Regex location wins over the /api/ prefix below.
    location ~ ^/api/(auth/login|portal/login|portal/activate|auth/password-reset/request)$ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API + WebSocket -> the backend service (same origin, so no CORS needed).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
